<!DOCTYPE html>
<html lang="pt-br">
<head>
    {% block head %}
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Minha Cantina</title>
        <link href="{{ url_for('static', filename='img/logo.ico') }}" rel="icon" type="image/x-icon">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
              integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
              crossorigin="anonymous">
        <link href="{{ url_for('static', filename='css/global.css') }}" rel="stylesheet">
    {% endblock %}
</head>
<body>
<main class="flex-grow-1">
    <div class="container mt-3">
        {% include 'components/modal_flash_message.html' %}
    </div>
    {% block content %}{% endblock %}
</main>
<footer>
    <div class="container text-center">
        <p class="mb-0">&copy;{{ now.year }} Minha Cantina - Jovem Programadora</p>
        <small class="text-muted">Horário de funcionamento: 07:00 às 22:00</small>
    </div>
</footer>
{% block scripts %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/5bed2a9789.js" crossorigin="anonymous"></script>
{% endblock %}
</body>
</html>
